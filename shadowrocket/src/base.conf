# ========== Shadowrocket Config - Ultimate Edition v1.1.0 by badregister ============
# Last update: May 13, 2026
#
# Changelog
# 1. 绝对 DNS 隔离 (国内阿里DoH 国外 CloudFlare/Google DoH)
# 2. Rule-Provider 异步挂载 (全量替换为 Blackmatrix7 工业级规则集)
# 3. 策略组设置微调, 按使用频率排序
# 4. 增量注入: 高敏金融、第三方支付、加密货币及流媒体独立分流架构
# 5. 精简冗余本地规则 (遵循原生 String 解析标准, 弃用冗余域名后缀, 保留 ASN)
# 6. 修正国旗字符、编码匹配及正则逻辑 未修改分流架构
# 7. 增量注入: VoWiFi 容灾备份通道可切换美区, respect-rules: false 获取真实IP
# 8. 节点防抖: 基础容差 自动测速 50ms, 地区策略组 75ms, AI 用 Non-HK 独立高容差 100ms
# 9. 净化审计 注释保留 测试观察
# 10. 妥协1 放弃绝对 DNS 隔离思路, 全面采用国内 DoH 提高弱网生存率及国内服务解析准确性
# 11. 妥协2 放弃DoH, 采用国内流氓大厂明文 DNS 以进一步提高弱网生存率
# 12. 策略组 emoji 批量替换
# 13. [v1.0.11] 废弃 ACL4SSR 全量挂载 BM7 解决 iCloud 及国内长尾域名漏网问题
# 14. [v1.0.12] 修正 BM7 订阅目录调用错位 (Surge -> Shadowrocket), 补齐底层特化拦截与局域网防线
# 15. 切换回 ACL4SSR, BM7 及 GEOSITE 均有覆盖及格式问题, 回滚观察
# 16. [v1.1.0] 架构定稿, 规则集持续测试优化:
#     引入 Loyalsoldier/surge-rules RULE-SET, 替换可等价基础规则集, 保留无等价专项规则
# 17. [2026-05-13] 补充苹果 Akamai CDN 直连规则 (apple.com.akadns.net, mail.me.com.akadns.net)
# 18. [2026-05-13] 补充苹果 CDN 直连规则 (ls-apple.com.akadns.net, apple-relay.fastly-edge.com)
# ====================================================================================

