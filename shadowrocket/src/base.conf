[Rule]
# === 基础防泄漏 ===
# RFC 1918 私有地址段 + localhost, 防止内网流量走代理
IP-CIDR,192.168.0.0/16,DIRECT,no-resolve
IP-CIDR,10.0.0.0/8,DIRECT,no-resolve
IP-CIDR,172.16.0.0/12,DIRECT,no-resolve
IP-CIDR,127.0.0.0/8,DIRECT,no-resolve

# === 核心传输层 (公共 DNS 与苹果推送) ===
# Apple 全段 IP(APNs + CDN)
IP-CIDR,17.0.0.0/8,🍎 苹果服务,no-resolve
# Safe Browsing token 走苹果策略组, 强制远程解析防污染
DOMAIN,token.safebrowsing.apple,🍎 苹果服务
# Google Public DNS, 走代理保证可达
IP-CIDR,8.8.8.8/32,🚀 节点选择,no-resolve
# Cloudflare DNS, 同上
IP-CIDR,1.1.1.1/32,🚀 节点选择,no-resolve

# === 订阅直连域名 ===
# [proxy-provider-direct-domains start]
# [proxy-provider-direct-domains end]

# === GitHub 固定规则 (冷启动保活) ===
# 冷启动时规则集尚未加载, 提前硬编码保证 GitHub 可达(规则集本身也从 GitHub 拉取)
DOMAIN,gist.github.com,🚀 节点选择
DOMAIN,raw.githubusercontent.com,🚀 节点选择
DOMAIN-SUFFIX,github.com,🚀 节点选择
# GitHub 静态资源 CDN
DOMAIN-SUFFIX,githubusercontent.com,🚀 节点选择
