DOMAIN-SUFFIX,github.dev,🚀 节点选择
DOMAIN-SUFFIX,githubcopilot.com,🚀 节点选择

# === VoWiFi 固定通道 (UDP 打洞, SIP, ePDG 鉴权) ===
# SIP 信令(明文)
DST-PORT,5060,📞 VoWiFi
# SIP-TLS 信令(加密)
DST-PORT,5061,📞 VoWiFi
# T-Mobile VoWiFi 网关
DOMAIN-SUFFIX,t-mobile.com,📞 VoWiFi
# 3GPP 标准 ePDG 域名格式
DOMAIN-SUFFIX,3gppnetwork.org,📞 VoWiFi
# ePDG(演进分组数据网关) 鉴权
DOMAIN-KEYWORD,epdg.epc,📞 VoWiFi
# IMS(IP 多媒体子系统) 核心域名
DOMAIN-KEYWORD,ims,📞 VoWiFi
# IKEv2/IPSec 密钥协商(UDP 500/4500)
DST-PORT,500,📞 VoWiFi
DST-PORT,4500,📞 VoWiFi

