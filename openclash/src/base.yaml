# =========== Universal Config - Mihomo Ultimate v1.1.0 by badregister ===============
# Last update: May 13, 2026
#
# Changelog
# 1. 绝对 DNS 隔离 (国内阿里DoH 国外 CloudFlare/Google DoH)
# 2. 多机场异步聚合 (FlowerCloud, oixCloud, Maying, Nexitally, LiangXin) Proxy-Provider
# 3. Rule-Provider 异步挂载 (ACL4SSR为主, Crypto采用 BM7)
# 4. 策略组设置微调, 按使用频率排序
# 5. 增量注入: 高敏金融、第三方支付、加密货币及流媒体独立分流架构
# 6. 精简冗余本地规则 (遵循原生 String 解析标准, 弃用冗余域名后缀, 保留 ASN)
# 7. 优化策略组选项 (全量横向内联排版)
# 8. Maying SSR 只用于手动切换以确保 VoWiFi 稳定工作
# 9. 修正国旗字符、编码匹配及正则逻辑 未修改分流架构
# 10. 增量注入: VoWiFi 容灾备份通道可切换美区; respect-rules: false 降低 DNS 预解析耗时
# 11. 节点防抖: 基础容差 自动测速 50ms, 其它策略组 75ms, Non-HK for AI 独立高容差 100ms
# 12. 净化审计 注释保留 测试观察 未定稿
# 13. 妥协: 放弃绝对 DNS 隔离思路, 全面采用国内 DoH 提高弱网生存率及国内服务解析准确性
# 14. 策略组 emoji 批量替换
# 15. sniffer 增加 QUIC 协议, 改善 UDP 分流效率, 豁免米家产品的嗅探阻断
# 16. 重构 dns, 使用 Mihomo 的 direct-nameserver 建立分流防线 撤销国内流氓大厂的 DNS 妥协
# 17. 优化 dns tun sniffer 设置 待观察
# 18. 订阅filter优化, 适配台湾节点, 增加韩国节点显示
# 19. 废弃部分文本型远程规则集, 改用 Geosite, 降低系统占用, 提高查询效率及冷启动生存率
# 20. 重新测试筛选远程规则集, 混用 BM7 和 ACL4SSR, 格式大坑须谨慎. 优化 12306
# 21. [v1.1.0] 架构定稿 规则集持续测试优化
# 22. 将可等价替换的远程规则集改为 GEOSITE:
#     Apple/Microsoft/OneDrive/GoogleFCM/Telegram/OpenAi/YouTube/Netflix/
#     Spotify/Epic/Steam/TikTok/Bilibili/GoogleCN/SteamCN
# 23. [2026-05-13] 补充苹果 Akamai CDN 直连规则 (apple.com.akadns.net, mail.me.com.akadns.net)
# 24. [2026-05-13] 补充苹果 CDN 直连规则 (ls-apple.com.akadns.net, apple-relay.fastly-edge.com)
# 25. [2026-05-13] 苹果域名移出 fake-ip-filter, 交由 direct-nameserver 处理, 修复 CNAME 漏网并优化冷启动
# ====================================================================================

port: 7890
socks-port: 7891
redir-port: 7892
tproxy-port: 7895
allow-lan: true
mode: rule
log-level: info
ipv6: false
unified-delay: true
tcp-concurrent: true

tun:
  enable: true
  stack: mixed
  dns-hijack:
    - any:53
    - tcp://any:53
  auto-route: true
  auto-detect-interface: true
  strict-route: true

geo-auto-update: true
geo-update-interval: 24
geox-url:
  geoip: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/geoip.dat"
  geosite: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/geosite.dat"
  mmdb: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/country.mmdb"
  asn: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/GeoLite2-ASN.mmdb"

sniffer:
  enable: true
  parse-pure-ip: true
  sniff:
    TLS:
      ports: [443, 8443]
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "Mijia Cloud"
    - "dlg.io.mi.com"
    - "+.push.apple.com"
    - '+.12306.cn'
    - '+.12306.com'

dns:
  enable: true
  cache-algorithm: arc
  ipv6: false
  listen: 0.0.0.0:1053
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  respect-rules: false
  fake-ip-filter:
    - '+.lan'
    - '+.local'
    - 'pool.ntp.org'
    - '+.3gppnetwork.org'
    - '+.t-mobile.com'
    - '+.12306.cn'
    - '+.12306.com'

  # bootstrap motor: force kernel to resolve DoH hostnames below via local UDP 53, required for cold start
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  # [isolation layer 1] direct-outbound DNS (handles all DIRECT-matched traffic)
  direct-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  direct-nameserver-follow-policy: true
  # [isolation layer 2] global overseas fallback (tunneled through proxy for remote resolution and anti-pollution)
  nameserver:
    - "https://1.1.1.1/dns-query#🚀 节点选择"
    - "https://dns.google/dns-query#🚀 节点选择"
  # [isolation layer 3] CN domain correction, ensures domestic services receive correct local CDN IPs
  nameserver-policy:
    "geosite:cn,private":
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query

