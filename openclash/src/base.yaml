rules:
  # === core transport layer (public DNS & Apple push) ===
  # force remote resolution and intercept Apple Safe Browsing token
  - DOMAIN,token.safebrowsing.apple,🍎 苹果服务
  - IP-CIDR,17.0.0.0/8,🍎 苹果服务,no-resolve
  - IP-CIDR,8.8.8.8/32,🚀 节点选择,no-resolve
  - IP-CIDR,1.1.1.1/32,🚀 节点选择,no-resolve

  # === subscription bootstrap cold-start (full physical direct) ===
  # [proxy-provider-direct-domains start] add subscription domains here when adding a new provider
  - DOMAIN-SUFFIX,xmancdn.com,🎯 全球直连
  - DOMAIN-SUFFIX,api-huacloud.dev,🎯 全球直连
  - DOMAIN-SUFFIX,oics.net,🎯 全球直连
  - DOMAIN-SUFFIX,sub.ssr.sh,🎯 全球直连
  - DOMAIN-SUFFIX,nxonearth.com,🎯 全球直连
  - DOMAIN-SUFFIX,metaglide.org,🎯 全球直连
  - DOMAIN-SUFFIX,liangxin.xyz,🎯 全球直连
  # [proxy-provider-direct-domains end]

  # === GitHub hardcoded rules (improve cold-start survivability) ===
  - DOMAIN,gist.github.com,🚀 节点选择
  - DOMAIN,raw.githubusercontent.com,🚀 节点选择
  - DOMAIN-SUFFIX,github.com,🚀 节点选择
  - DOMAIN-SUFFIX,githubusercontent.com,🚀 节点选择
  - DOMAIN-SUFFIX,githubassets.com,🚀 节点选择
  - DOMAIN-SUFFIX,github.io,🚀 节点选择
  - GEOSITE,github,🚀 节点选择

  # === VoWiFi dedicated lane (UDP traversal, SIP, ePDG auth) ===
  - DST-PORT,5060,📞 VoWiFi
  - DST-PORT,5061,📞 VoWiFi
  - DOMAIN-SUFFIX,t-mobile.com,📞 VoWiFi
  - DOMAIN-SUFFIX,3gppnetwork.org,📞 VoWiFi
  - DOMAIN-KEYWORD,epdg.epc,📞 VoWiFi
  - DOMAIN-KEYWORD,ims,📞 VoWiFi
  - AND,((NETWORK,UDP),(OR,((DST-PORT,500),(DST-PORT,4500)))),📞 VoWiFi

  # === LAN anti-leak and direct passthrough ===
  - RULE-SET,LocalAreaNetwork,🎯 全球直连
  - RULE-SET,UnBan,🎯 全球直连

  # === game platform and auth API intercepts ===
  # Activision (CODM, etc.)
  - DOMAIN-SUFFIX,activision.com,🎮 游戏平台
  - DOMAIN-SUFFIX,callofduty.com,🎮 游戏平台
  - DOMAIN-KEYWORD,codm,🎮 游戏平台
  - AND,((NETWORK,UDP),(DST-PORT,7500-7650)),🎮 游戏平台
  # Genshin Impact
  - DOMAIN-SUFFIX,hoyoverse.com,🎮 游戏平台
  - DOMAIN-SUFFIX,hoyolab.com,🎮 游戏平台
  - DOMAIN-SUFFIX,cognosphere.com,🎮 游戏平台
  # Tencent overseas infra (CODM, PUBGM, Nikke auth and anti-cheat)
  - DOMAIN-SUFFIX,proximabeta.com,🎮 游戏平台
  - DOMAIN-SUFFIX,gcloudcs.com,🎮 游戏平台
  - DOMAIN-SUFFIX,levelinfinite.com,🎮 游戏平台
  - DOMAIN-SUFFIX,tdsgame.com,🎮 游戏平台
  - DOMAIN-KEYWORD,proximabeta,🎮 游戏平台
  # Ubisoft (Rainbow Six, Division, etc.)
  - DOMAIN-SUFFIX,ubisoft.com,🎮 游戏平台
  - DOMAIN-SUFFIX,ubi.com,🎮 游戏平台
  - DOMAIN-KEYWORD,ubisoft,🎮 游戏平台
  # generic telemetry and attribution SDKs (forced intercept to bypass ad-library disconnects)
  - DOMAIN-SUFFIX,appsflyer.com,🎮 游戏平台
  - DOMAIN-SUFFIX,adjust.com,🎮 游戏平台
  - DOMAIN-SUFFIX,rayjump.com,🎮 游戏平台
  - DOMAIN-KEYWORD,crashlytics,🎮 游戏平台

  # === sensitive assets routing (cross-border finance / crypto) ===
