# platform: Stash
# version: v1.2.0
# updated: 2026-05-20
# project: https://github.com/badregisters/UniFOM

port: 7890
socks-port: 7891
# [Mihomo] redir-port: 7892
# [Mihomo] tproxy-port: 7895
allow-lan: true
mode: rule
log-level: info
ipv6: false
unified-delay: true
# [Mihomo] tcp-concurrent: true

tun:
  enable: true
  stack: mixed
  dns-hijack:
    - any:53
    - tcp://any:53
  auto-route: true
  auto-detect-interface: true
  strict-route: true

# [Mihomo] geo-auto-update: true
# [Mihomo] geo-update-interval: 24
# [Mihomo] geox-url:
#   geoip: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/geoip.dat"
#   geosite: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/geosite.dat"
#   mmdb: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/country.mmdb"
#   asn: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/GeoLite2-ASN.mmdb"

sniffer:
  enable: true
  # [Mihomo] parse-pure-ip: true
  sniff:
    TLS:
      ports: [443, 8443]
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    # [Mihomo] QUIC:
    #   ports: [443, 8443]
  skip-domain:
    - "Mijia Cloud"
    - "dlg.io.mi.com"
    - "+.push.apple.com"
    - '+.12306.cn'
    - '+.12306.com'

dns:
  enable: true
  # [Mihomo] cache-algorithm: arc
  ipv6: false
  listen: 0.0.0.0:1053
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  # [Mihomo] respect-rules: false
  fake-ip-filter:
    - '+.lan'
    - '+.local'
    - 'pool.ntp.org'
    - '+.3gppnetwork.org'
    - '+.t-mobile.com'
    - '+.12306.cn'
    - '+.12306.com'

  # DNS bootstrap anchor: forces kernel to resolve DoH endpoints below via plain UDP 53 — cold-start prerequisite
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  # [Mihomo] proxy-server-nameserver:
  #   - https://dns.alidns.com/dns-query
  #   - https://doh.pub/dns-query
  # [Mihomo] direct-nameserver — Stash does not support this directive.
  # Compensated via nameserver-policy (geosite:cn → CN DoH) + fallback (geoip:CN → CN DoH).
  # [Mihomo] proxy-server-nameserver:
  #   - https://dns.alidns.com/dns-query
  #   - https://doh.pub/dns-query
  # [Mihomo] direct-nameserver-follow-policy: true
  # [tier 1] foreign DoH — queried for all non-CN domains; 1.1.1.1 is accessible in CN via PoP
  # Note: #proxy-group tagging is Mihomo-only; Stash uses direct DoH here
  nameserver:
    - "https://1.1.1.1/dns-query"
    - "https://dns.google/dns-query"
  # [tier 2] CN domain override — geosite:cn pins domestic domains to CN DoH
  # Note: comma-separated geosite keys (geosite:cn,private) are Mihomo-only; use single geosite key here
  # Note: list values in nameserver-policy are supported per official docs, but cause !!seq parse errors
  # in practice — using single string until confirmed working with user's Stash version
  nameserver-policy:
    "geosite:cn": "https://dns.alidns.com/dns-query"
  # [tier 3] cold-start fallback — if 1.1.1.1 unreachable, CN-IP responses fall back to CN DoH
  # Note: fallback/fallback-filter are Clash Premium-inherited fields; behaves correctly in Stash
  fallback:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN
