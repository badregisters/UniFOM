# =========== Universal Config - Stash (Clash Premium) v1.1.0 by badregister ========
# Last update: May 14, 2026
# Platform: Stash (Clash Premium core) — iOS
#
# Changelog
# 1. 绝对 DNS 隔离 (国内阿里DoH 国外 CloudFlare/Google DoH)
# 2. 多机场异步聚合 (FlowerCloud, oixCloud, Maying, Nexitally, LiangXin) Proxy-Provider
# 3. Rule-Provider 异步挂载 (ACL4SSR为主, Crypto采用 BM7)
# 4. 策略组设置微调, 按使用频率排序
# 5. 增量注入: 高敏金融、第三方支付、加密货币及流媒体独立分流架构
# 6. 精简冗余本地规则 (遵循原生 String 解析标准, 弃用冗余域名后缀, 保留 ASN)
# 7. 优化策略组选项 (全量横向内联排版)
# 8. Maying SSR 只用于手动切换以确保 VoWiFi 稳定工作
# 9. 修正国旗字符、编码匹配及正则逻辑 未修改分流架构
# 10. 增量注入: VoWiFi 容灾备份通道可切换美区
# 11. 节点防抖: 基础容差 自动测速 50ms, 其它策略组 75ms, Non-HK for AI 独立高容差 100ms
# 12. 净化审计 注释保留 测试观察 未定稿
# 13. 妥协: 放弃绝对 DNS 隔离思路, 全面采用国内 DoH 提高弱网生存率及国内服务解析准确性
# 14. 策略组 emoji 批量替换
# 15. sniffer 增加 TLS/HTTP 协议嗅探, 豁免米家产品
# 16. 重构 dns, nameserver-policy 建立 CN 分流防线; geosite:apple 显式钉入补偿 direct-nameserver 缺失
# 17. 优化 dns tun sniffer 设置 待观察
# 18. 订阅filter优化, 适配台湾节点, 增加韩国节点显示
# 19. 废弃部分文本型远程规则集, 改用 Geosite, 降低系统占用, 提高查询效率及冷启动生存率
# 20. 重新测试筛选远程规则集, 混用 BM7 和 ACL4SSR, 格式大坑须谨慎. 优化 12306
# 21. [v1.0.0-rc.1] Stash 移植版: Clash Premium 内核兼容
# 22. [2026-05-14] Stash 3.0: AND/OR/NOT 逻辑规则及 nameserver-policy 列表格式确认支持
#     AND 规则与 Mihomo 完全统一至 clash/src/base.yaml
# 23. [2026-05-14] 重构: 单源架构, platform/stash.yaml 承载 Stash 专属 dns 头部
# 24. [2026-05-14] 维护原则确立: 以 OC 为准; 静默忽略的指令保留激活态; 仅 direct-nameserver
#     系列有实质行为差异, 保留 [Mihomo] 标记并补充 Stash 等价实现
# ====================================================================================

port: 7890
socks-port: 7891
redir-port: 7892
tproxy-port: 7895
allow-lan: true
mode: rule
log-level: info
ipv6: false
unified-delay: true
tcp-concurrent: true

tun:
  enable: true
  stack: mixed
  dns-hijack:
    - any:53
    - tcp://any:53
  auto-route: true
  auto-detect-interface: true
  strict-route: true

geo-auto-update: true
geo-update-interval: 24
geox-url:
  geoip: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/geoip.dat"
  geosite: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/geosite.dat"
  mmdb: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/country.mmdb"
  asn: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/GeoLite2-ASN.mmdb"

sniffer:
  enable: true
  parse-pure-ip: true
  sniff:
    TLS:
      ports: [443, 8443]
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "Mijia Cloud"
    - "dlg.io.mi.com"
    - "+.push.apple.com"
    - '+.12306.cn'
    - '+.12306.com'

dns:
  enable: true
  cache-algorithm: arc
  ipv6: false
  listen: 0.0.0.0:1053
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  respect-rules: false
  fake-ip-filter:
    - '+.lan'
    - '+.local'
    - 'pool.ntp.org'
    - '+.3gppnetwork.org'
    - '+.t-mobile.com'
    - '+.12306.cn'
    - '+.12306.com'

  # DNS bootstrap anchor: forces kernel to resolve DoH endpoints below via plain UDP 53 — cold-start prerequisite
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  # [Mihomo] direct-nameserver — Stash does not support; geosite:apple pinned below as equivalent
  # direct-nameserver:
  #   - https://dns.alidns.com/dns-query
  #   - https://doh.pub/dns-query
  # [Mihomo] direct-nameserver-follow-policy: true
  # [air-gap tier 1] proxied fallback — remote resolution via tunnel, guards against DNS poisoning
  nameserver:
    - "https://1.1.1.1/dns-query#🚀 节点选择"
    - "https://dns.google/dns-query#🚀 节点选择"
  # [air-gap tier 2] CN domain override — pins domestic services to correct local CDN endpoints
  # geosite:apple explicitly pinned to AliDoH — compensates for missing direct-nameserver
  nameserver-policy:
    "geosite:cn,private":
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query
    "geosite:apple":
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query
