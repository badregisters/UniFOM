# platform: Stash
# version: v1.2.0
# updated: 2026-05-20
# project: https://github.com/badregisters/UniFOM

port: 7890
socks-port: 7891
# [Mihomo] redir-port: 7892
# [Mihomo] tproxy-port: 7895
allow-lan: true
mode: rule
log-level: info
ipv6: false
unified-delay: true
# [Mihomo] tcp-concurrent: true

tun:
  enable: true
  stack: mixed
  dns-hijack:
    - any:53
    - tcp://any:53
  auto-route: true
  auto-detect-interface: true
  strict-route: true

# [Mihomo] geo-auto-update: true
# [Mihomo] geo-update-interval: 24
# [Mihomo] geox-url:
#   geoip: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/geoip.dat"
#   geosite: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/geosite.dat"
#   mmdb: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/country.mmdb"
#   asn: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/GeoLite2-ASN.mmdb"

sniffer:
  enable: true
  # [Mihomo] parse-pure-ip: true
  sniff:
    TLS:
      ports: [443, 8443]
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    # [Mihomo] QUIC:
    #   ports: [443, 8443]
  skip-domain:
    - "Mijia Cloud"
    - "dlg.io.mi.com"
    - "+.push.apple.com"
    - '+.12306.cn'
    - '+.12306.com'

dns:
  enable: true
  # [Mihomo] cache-algorithm: arc
  ipv6: false
  listen: 0.0.0.0:1053
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  follow-rule: true
  # [Mihomo] respect-rules: false
  fake-ip-filter:
    - '+.lan'
    - '+.local'
    - 'pool.ntp.org'
    - '+.3gppnetwork.org'
    - '+.t-mobile.com'
    - '+.12306.cn'
    - '+.12306.com'

  # DNS bootstrap anchor: forces kernel to resolve DoH endpoints below via plain UDP 53 — cold-start prerequisite
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  # Stash cannot tag nameserver with #proxy-group (Mihomo-only), so foreign DoH (1.1.1.1)
  # goes direct — unreliable on CN mobile networks. In fake-ip mode this is fine:
  # proxied domains never need local DNS resolution (proxy resolves them);
  # only DIRECT connections need real IPs, and those are CN domains served correctly by CN DoH.
  # Trade-off: CN DoH sees foreign domain queries — unavoidable under Stash constraints.
  nameserver:
    - "https://dns.alidns.com/dns-query"
    - "https://doh.pub/dns-query"
  nameserver-policy:
    "geosite:cn": "https://dns.alidns.com/dns-query"
