# platform: Stash
# version: v1.1.0
# updated: 2026-05-14
# project: https://github.com/badregisters/UniFOM

port: 7890
socks-port: 7891
# [Mihomo] redir-port: 7892
# [Mihomo] tproxy-port: 7895
allow-lan: true
mode: rule
log-level: info
ipv6: false
unified-delay: true
# [Mihomo] tcp-concurrent: true

tun:
  enable: true
  stack: mixed
  dns-hijack:
    - any:53
    - tcp://any:53
  auto-route: true
  auto-detect-interface: true
  strict-route: true

# [Mihomo] geo-auto-update: true
# [Mihomo] geo-update-interval: 24
# [Mihomo] geox-url:
#   geoip: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/geoip.dat"
#   geosite: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/geosite.dat"
#   mmdb: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/country.mmdb"
#   asn: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/GeoLite2-ASN.mmdb"

sniffer:
  enable: true
  # [Mihomo] parse-pure-ip: true
  sniff:
    TLS:
      ports: [443, 8443]
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    # [Mihomo] QUIC:
    #   ports: [443, 8443]
  skip-domain:
    - "Mijia Cloud"
    - "dlg.io.mi.com"
    - "+.push.apple.com"
    - '+.12306.cn'
    - '+.12306.com'

dns:
  enable: true
  # [Mihomo] cache-algorithm: arc
  ipv6: false
  listen: 0.0.0.0:1053
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  # [Mihomo] respect-rules: false
  fake-ip-filter:
    - '+.lan'
    - '+.local'
    - 'pool.ntp.org'
    - '+.3gppnetwork.org'
    - '+.t-mobile.com'
    - '+.12306.cn'
    - '+.12306.com'

  # DNS bootstrap anchor: forces kernel to resolve DoH endpoints below via plain UDP 53 — cold-start prerequisite
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  # [Mihomo] proxy-server-nameserver:
  #   - https://dns.alidns.com/dns-query
  #   - https://doh.pub/dns-query
  # [Mihomo] direct-nameserver — Stash does not support this directive.
  # Compensated via nameserver-policy (geosite:cn → CN DoH) + fallback (geoip:CN → CN DoH).
  # nameserver-policy handles warm-start with precision; fallback catches cold-start and any
  # geosite miss — both query concurrently, so cold-start never blocks on a proxy timeout.
  # direct-nameserver:
  #   - https://dns.alidns.com/dns-query
  #   - https://doh.pub/dns-query
  # [Mihomo] direct-nameserver-follow-policy: true
  # [air-gap tier 1] proxied nameserver — remote resolution via tunnel, guards against DNS poisoning
  nameserver:
    - "https://1.1.1.1/dns-query#🚀 节点选择"
    - "https://dns.google/dns-query#🚀 节点选择"
  # [air-gap tier 2] CN domain override — geosite:cn pins domestic domains to CN DoH (warm-start)
  # Note: Stash does not support list values in nameserver-policy (Mihomo-only); single string used
  nameserver-policy:
    "geosite:cn,private": "https://dns.alidns.com/dns-query"
  # [air-gap tier 3] cold-start safety net — if nameserver fails or geosite:cn is unavailable,
  # CN-IP responses trigger fallback to CN DoH; uses local geoip MMDB, no CDN dependency
  fallback:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN
