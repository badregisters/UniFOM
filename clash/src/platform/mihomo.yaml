# platform: OpenClash (Mihomo)
# version: v1.1.0
# updated: 2026-05-13
# project: https://github.com/badregisters/UniFOM

port: 7890
socks-port: 7891
redir-port: 7892
tproxy-port: 7895
allow-lan: true
mode: rule
log-level: info
ipv6: false
unified-delay: true
tcp-concurrent: true

tun:
  enable: true
  stack: mixed
  dns-hijack:
    - any:53
    - tcp://any:53
  auto-route: true
  auto-detect-interface: true
  strict-route: true

geo-auto-update: true
geo-update-interval: 24
geox-url:
  geoip: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/geoip.dat"
  geosite: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/geosite.dat"
  mmdb: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/country.mmdb"
  asn: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/GeoLite2-ASN.mmdb"

sniffer:
  enable: true
  parse-pure-ip: true
  sniff:
    TLS:
      ports: [443, 8443]
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "Mijia Cloud"
    - "dlg.io.mi.com"
    - "+.push.apple.com"
    - '+.12306.cn'
    - '+.12306.com'

dns:
  enable: true
  cache-algorithm: arc
  ipv6: false
  listen: 0.0.0.0:1053
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  respect-rules: false
  fake-ip-filter:
    - '+.lan'
    - '+.local'
    - 'pool.ntp.org'
    - '+.3gppnetwork.org'
    - '+.t-mobile.com'
    - '+.12306.cn'
    - '+.12306.com'

  # DNS bootstrap anchor: forces kernel to resolve DoH endpoints below via plain UDP 53 — cold-start prerequisite
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  # [air-gap tier 1] direct-path nameserver — handles all DIRECT-matched traffic
  direct-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  direct-nameserver-follow-policy: true
  # [air-gap tier 2] proxied fallback — remote resolution via tunnel, guards against DNS poisoning
  nameserver:
    - "https://1.1.1.1/dns-query#🚀 节点选择"
    - "https://dns.google/dns-query#🚀 节点选择"
  # [air-gap tier 3] CN domain override — pins domestic services to correct local CDN endpoints
  nameserver-policy:
    "geosite:cn,private":
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query
