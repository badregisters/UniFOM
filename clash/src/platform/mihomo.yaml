# platform: OpenClash (Mihomo)
# version: v1.2.0
# updated: 2026-05-25
# project: https://github.com/badregisters/UniFOM
#
# ── OpenClash 字段接管说明 ────────────────────────────────────────────────────
# 以下字段在 OpenClash 环境下会被插件覆盖或接管，与本文件设置可能不一致：
#
# [tun 段]  auto-route / dns-hijack / tproxy-port / stack 等由 OpenClash
#           「网络栈」设置接管并重写；本文件的 tun 设置仅作为 fallback 基准。
#           stack 此处设为 gvisor，须与 OC GUI「网络栈」选项保持一致。
#
# [dns 段]  是否生效取决于 OpenClash「DNS 设置」是否关闭接管；
#           若 OC 开启 DNS 接管，本段 listen 端口与 nameserver 均会被覆盖。
#
# [geo]     GEO 数据库下载由本 yaml 的 geox-url 负责；
#           OpenClash「GEO 数据库订阅」tab 应关闭自动更新，避免与本配置冲突。
#
# [其他]    mixed-port / external-controller / secret / authentication /
#           profile / ntp 等由 OpenClash 注入，不在本文件管理。
# ─────────────────────────────────────────────────────────────────────────────

port: 7890
socks-port: 7891
redir-port: 7892
tproxy-port: 7895
allow-lan: true
mode: rule
log-level: info
ipv6: false
unified-delay: true
tcp-concurrent: true

profile:
  store-selected: true
  store-fake-ip: true # persist fake-ip map across restarts, reduces cold-start DNS churn

tun:
  enable: true
  stack: gvisor
  dns-hijack:
    - any:53
    - tcp://any:53
  auto-route: true
  auto-detect-interface: true
  strict-route: true

geo-auto-update: true
geo-update-interval: 24
geox-url:
  geoip: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/geoip.dat"
  geosite: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/geosite.dat"
  mmdb: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/country.mmdb"
  asn: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/GeoLite2-ASN.mmdb"

sniffer:
  enable: true
  parse-pure-ip: true
  sniff:
    TLS:
      ports: [443, 8443]
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "Mijia Cloud"
    - "dlg.io.mi.com"
    - "+.push.apple.com"
    - '+.12306.cn'
    - '+.12306.com'

dns:
  enable: true
  cache-algorithm: arc
  ipv6: false
  listen: 0.0.0.0:1053
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  respect-rules: false
  fake-ip-filter:
    - '+.lan'
    - '+.local'
    - 'pool.ntp.org'
    - '+.3gppnetwork.org'
    - '+.t-mobile.com'
    - '+.12306.cn'
    - '+.12306.com'

  # DNS bootstrap anchor: forces kernel to resolve DoH endpoints below via plain UDP 53 — cold-start prerequisite
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  # [air-gap tier 1] direct-path nameserver — handles all DIRECT-matched traffic
  direct-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  direct-nameserver-follow-policy: true
  # [air-gap tier 2] proxied fallback — remote resolution via tunnel, guards against DNS poisoning
  nameserver:
    - "https://1.1.1.1/dns-query#🚀 节点选择"
    - "https://dns.google/dns-query#🚀 节点选择"
  # [air-gap tier 3] CN domain override — pins domestic services to correct local CDN endpoints
  nameserver-policy:
    "geosite:cn,private":
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query
