# secrets.yaml 配置模版
# 复制此文件为 secrets.yaml，填入真实订阅链接后运行 build.py
#
# 简写格式（默认归入地区自动 + 手动切换两个策略组）：
# 机场名称: "订阅链接"
#
# 完整格式（所有字段均可选，url 必填）：
# 机场名称:
#   url: "订阅链接"
#   groups: regional,manual   # 归属策略组，逗号分隔；可选值: regional / manual
#   extra_domains:            # 订阅域名之外需要直连的 CDN 域名（可选）
#     - cdn.example.com

# ── 示例（以花云为例）─────────────────────────────────────────────────────────

# 简写格式
FlowerCloud: "https://subscribe.flowerclouds.example/api/v1/client/subscribe?token=xxxxxxxx"

# 完整格式
# FlowerCloud:
#   url: "https://subscribe.flowerclouds.example/api/v1/client/subscribe?token=xxxxxxxx"
#   groups: regional,manual
#   extra_domains:
#     - flowerclouds.example
