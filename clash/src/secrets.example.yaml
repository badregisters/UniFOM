# secrets.yaml 配置模版
# 复制此文件为 secrets.yaml，填入真实订阅链接后运行 build.py
#
# 本文件是多机场聚合的核心配置：
#   - 支持同时接入多个机场，每个机场独立为一个 proxy-provider 节点池
#   - 构建时自动生成订阅直连规则，确保订阅链接本身走直连，不经过代理
#   - 每个机场可独立指定归属策略组（地区自动 / 手动切换），互不干扰
#   - 订阅链接中嵌套的 CDN 域名会被自动识别并加入直连规则
#
# 构建命令：
#   python3 scripts/build.py           # 输出全部平台
#   python3 scripts/build.py oc        # 仅输出 OpenClash
#   python3 scripts/build.py stash     # 仅输出 Stash
#   python3 scripts/build.py sr        # 仅输出 Shadowrocket
#
# ── 格式说明 ───────────────────────────────────────────────────────────────────
#
# 简写格式（默认归入地区自动 + 手动切换两个策略组）：
# 机场名称: "订阅链接"
#
# 完整格式（所有字段均可选，url 必填）：
# 机场名称:
#   url: "订阅链接"
#   groups: regional,manual   # 归属策略组，逗号分隔；可选值: regional / manual / economy / ai
#   shared_groups: regional,manual   # 可选：仅 oc-shared 构建时生效的 groups 覆盖；缺省则回退用 groups
#   shared: true              # 是否纳入共享版 dist（oc-shared）；默认 false
#   full: false               # 是否纳入个人完整版（oc / stash / sr）；默认 true
#   extra_domains:            # 订阅链接之外额外需要直连的域名（通常无需填写，构建时自动识别）
#     - cdn.example.com
#
# groups 说明：
#   regional  — 节点进入各地区自动测速组（香港 / 台湾 / 日本 / 新加坡 / 美国等）
#   manual    — 节点进入手动切换组，可在策略组界面直接选择
#   economy   — 节点进入省流节点（三端统一按关键词正则筛选，正则写在 base.yaml / base.conf 里）
#   finance   — 节点进入香港金融专属子组（🇭🇰 香港·金融，仅 OC/Stash 生效，SR 无法按机场隔离）
#   premium   — 地区组「优选」层：高可信机场，各地区组默认走这里，仅 OC/Stash 生效
#   standard  — 地区组「次选」层：优选机场不可用时的自动降级候选，仅 OC/Stash 生效
#   仅 regional/manual 为默认行为；仅填 manual 适合不参与自动测速、用于特定用途的机场
#
# premium/standard 说明：
#   各地区组（香港/台湾/日本/韩国/新加坡/美国/英国/马来）现为 fallback 类型：
#   优先用 premium 机场的节点，健康检查失败才自动切到 standard 机场兜底
#   两者都是自动降级，不需要手动干预；彻底手动挑节点仍用 手动切换 组
#   SR 无按机场分组能力，地区组维持原有单层 url-test，不受此影响
#
# shared_groups 说明：
#   仅在构建 oc-shared 时生效，覆盖该机场的 groups（个人完整版 oc/stash/sr 不受影响）
#   典型场景：某机场在个人版仅想手动切换，但 shared 版需要它撑起地区组，
#   避免 shared 版所有 regional 依赖的机场都被排除在外导致 use: [] 报错
#
# shared 说明：
#   true   — 纳入 oc-shared 共享版（适合无需手动开启订阅窗口的机场）
#   false  — 仅出现在个人完整版（默认）
#
# full 说明：
#   true   — 纳入个人完整版 oc / stash / sr（默认）
#   false  — 不进完整版；配合 shared: true 可实现「仅共享版、个人版排除」

# ── 示例（以花云为例，多机场并列填写）────────────────────────────────────────

# 简写格式（shared 默认 false，仅进个人完整版）
FlowerCloud: "https://subscribe.flowerclouds.example/api/v1/client/subscribe?token=xxxxxxxx"

# 完整格式（适合需要单独指定策略组、shared 或额外直连域名的机场）
# AnotherProvider:
#   url: "https://subscribe.another.example/api/v1/client/subscribe?token=yyyyyyyy"
#   groups: manual
#   shared: true
#   extra_domains:
#     - cdn.another.example
