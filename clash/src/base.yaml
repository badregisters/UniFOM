rules:
  # === core transport layer (public DNS & Apple push) ===
  - DOMAIN,token.safebrowsing.apple,🍎 苹果服务  # Safe Browsing token 走苹果策略组，强制远程解析防污染
  - IP-CIDR,17.0.0.0/8,🍎 苹果服务,no-resolve  # Apple 全段 IP（APNs + CDN）
  - IP-CIDR,8.8.8.8/32,🚀 节点选择,no-resolve  # Google Public DNS，走代理保证可达
  - IP-CIDR,1.1.1.1/32,🚀 节点选择,no-resolve  # Cloudflare DNS，同上

  # === subscription bootstrap cold-start (full physical direct) ===
  # [GENERATED: direct-domains]

  # === GitHub hardcoded rules (improve cold-start survivability) ===
  # 冷启动时规则集尚未加载，提前硬编码保证 GitHub 可达（规则集本身也从 GitHub 拉取）
  - DOMAIN,gist.github.com,🚀 节点选择
  - DOMAIN,raw.githubusercontent.com,🚀 节点选择
  - DOMAIN-SUFFIX,github.com,🚀 节点选择
  - DOMAIN-SUFFIX,githubusercontent.com,🚀 节点选择
  - DOMAIN-SUFFIX,githubassets.com,🚀 节点选择  # GitHub 静态资源 CDN
  - DOMAIN-SUFFIX,github.io,🚀 节点选择         # GitHub Pages
  - GEOSITE,github,🚀 节点选择                  # 兜底：覆盖规则集里的完整 GitHub 域名列表

  # === VoWiFi dedicated lane (UDP traversal, SIP, ePDG auth) ===
  - DST-PORT,5060,📞 VoWiFi  # SIP 信令（明文）
  - DST-PORT,5061,📞 VoWiFi  # SIP-TLS 信令（加密）
  - DOMAIN-SUFFIX,t-mobile.com,📞 VoWiFi       # T-Mobile VoWiFi 网关
  - DOMAIN-SUFFIX,3gppnetwork.org,📞 VoWiFi    # 3GPP 标准 ePDG 域名格式
  - DOMAIN-KEYWORD,epdg.epc,📞 VoWiFi          # ePDG（演进分组数据网关）鉴权
  - DOMAIN-KEYWORD,ims,📞 VoWiFi               # IMS（IP 多媒体子系统）核心域名
  - AND,((NETWORK,UDP),(OR,((DST-PORT,500),(DST-PORT,4500)))),📞 VoWiFi  # IKEv2/IPSec 密钥协商（UDP 500/4500）

  # === LAN anti-leak and direct passthrough ===
  - RULE-SET,LocalAreaNetwork,🎯 全球直连  # RFC 1918 私有地址 + localhost，防止内网流量走代理
  - RULE-SET,UnBan,🎯 全球直连            # 解除曾被 BanAD 误杀的正常域名

  # === game platform and auth API intercepts ===
  # Activision (CODM, etc.)
  - DOMAIN-SUFFIX,activision.com,🎮 游戏平台
  - DOMAIN-SUFFIX,callofduty.com,🎮 游戏平台
  - AND,((NETWORK,UDP),(DST-PORT,7500-7650)),🎮 游戏平台  # [Mihomo]
  # Genshin Impact
  - DOMAIN-SUFFIX,hoyoverse.com,🎮 游戏平台
  - DOMAIN-SUFFIX,hoyolab.com,🎮 游戏平台
  - DOMAIN-SUFFIX,cognosphere.com,🎮 游戏平台
  # Tencent overseas infra (CODM, PUBGM, Nikke auth and anti-cheat)
  - DOMAIN-SUFFIX,proximabeta.com,🎮 游戏平台
  - DOMAIN-SUFFIX,gcloudcs.com,🎮 游戏平台
  - DOMAIN-SUFFIX,levelinfinite.com,🎮 游戏平台
  - DOMAIN-SUFFIX,tdsgame.com,🎮 游戏平台
  - DOMAIN-KEYWORD,proximabeta,🎮 游戏平台
  # Ubisoft (Rainbow Six, Division, etc.)
  - DOMAIN-SUFFIX,ubisoft.com,🎮 游戏平台
  - DOMAIN-SUFFIX,ubi.com,🎮 游戏平台
  - DOMAIN-KEYWORD,ubisoft,🎮 游戏平台
  # generic telemetry and attribution SDKs (forced intercept to bypass ad-library disconnects)
  - DOMAIN-SUFFIX,appsflyer.com,🎮 游戏平台
  - DOMAIN-SUFFIX,adjust.com,🎮 游戏平台
  - DOMAIN-SUFFIX,rayjump.com,🎮 游戏平台
  - DOMAIN-KEYWORD,crashlytics,🎮 游戏平台

  # === sensitive assets routing (cross-border finance / crypto) ===
  - DOMAIN-KEYWORD,wise,🦉 Wise              # Wise 国际转账
  - DOMAIN-SUFFIX,transferwise.com,🦉 Wise   # Wise 旧域名
  - DOMAIN-KEYWORD,paypal,🅿️ PayPal          # PayPal
  - DOMAIN-KEYWORD,hsbc,🏦 香港金融           # 汇丰银行
  - DOMAIN-KEYWORD,bochk,🏦 香港金融          # 中银香港
  - DOMAIN-KEYWORD,cmbwinglung,🏦 香港金融    # 招商永隆银行
  - DOMAIN-KEYWORD,hangseng,🏦 香港金融       # 恒生银行
  - DOMAIN-KEYWORD,hkbea,🏦 香港金融          # 东亚银行
  - DOMAIN-SUFFIX,sc.com,🏦 香港金融          # 渣打银行
  - DOMAIN-SUFFIX,citibank.com.hk,🏦 香港金融 # 花旗香港
  - DOMAIN-SUFFIX,za.group,🏦 香港金融        # ZA Bank（众安银行）
  - DOMAIN-SUFFIX,mox.com,🏦 香港金融         # Mox Bank（渣打虚拟银行）
  - DOMAIN-SUFFIX,livibank.com,🏦 香港金融    # livi bank（中银虚拟银行）
  - DOMAIN-SUFFIX,welab.bank,🏦 香港金融      # WeLab Bank（汇立银行）
  - RULE-SET,Crypto_Rules,🪙 Crypto           # 加密货币交易所域名规则集

  # === custom overrides start ===
  # Windows RDP — 走微软策略组直连，避免代理节点封锁 3389 端口
  - DST-PORT,3389,🪟 微软服务
  # Apple CDN domains via third-party CDN (theoretically redundant after fake-ip-filter removal, kept during observation period)
  # - DOMAIN-SUFFIX,apple.com.akadns.net,🍎 苹果服务
  # - DOMAIN-SUFFIX,mail.me.com.akadns.net,🍎 苹果服务
  # - DOMAIN-SUFFIX,ls-apple.com.akadns.net,🍎 苹果服务
  # - DOMAIN-SUFFIX,apple-relay.fastly-edge.com,🍎 苹果服务
  - DOMAIN-SUFFIX,browserleaks.com,🚀 节点选择
  # block Alibaba SDK UDP tunnel probes to cut DNS resolution loops
  - DOMAIN,test.tunnel.com,REJECT
  # === NotebookLM and Google AI auth targeting ===
  - DOMAIN,accounts.google.com,🤖 AI 服务
  - DOMAIN,oauth2.googleapis.com,🤖 AI 服务
  - DOMAIN,alkali.google.com,🤖 AI 服务
  - DOMAIN,generativelanguage.googleapis.com,🤖 AI 服务
  - DOMAIN,notebooklm-pa.googleapis.com,🤖 AI 服务
  - DOMAIN-KEYWORD,notebooklm,🤖 AI 服务
  # === AutoDesk block ===
  - DOMAIN-SUFFIX,api.genuine-software.autodesk.com,REJECT
  - DOMAIN-SUFFIX,genuine-software2.autodesk.com,REJECT
  # === custom overrides end ===

  # === CN tech giants hardcoded direct (Tencent / Alibaba / ASN exemptions) ===
  # GEOIP:CN 未必覆盖所有海外托管的国内厂商 IP，ASN 豁免作为补充
  - IP-ASN,132203,🎯 全球直连,no-resolve  # Tencent Cloud（国际）
  - IP-ASN,131830,🎯 全球直连,no-resolve  # Tencent Cloud（香港/海外节点）
  - IP-ASN,45090,🎯 全球直连,no-resolve   # Shenzhen Tencent（国内主干）
